<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14 - New Wapon</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0b111a;
            font-family: 'EB Garamond', serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            color: #d2b88b;
            position: relative;
        }

        .mobile-container {
            width: 100%;
            max-width: 420px;
            height: 900px;
            
            display: flex;
            flex-direction: column;
            overflow: hidden;
            
            
            
            
        
            background-color: #080b10;
            background-image: linear-gradient(rgba(4, 9, 14, 0.5), rgba(4, 9, 14, 0.5)), url('./images/image%2013.png');
            background-size: cover;
            background-position: center;
            border-radius: 40px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            border: 2px solid rgba(210, 184, 139, 0.15);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transform-origin: center center;
            padding: 20px 30px 30px;}

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative;
            z-index: 10;
            width: 100%;
        }

        .back-btn {
            width: 80px;
            
            object-fit: contain;
            cursor: pointer;
            margin-top: 10px;
        }
        .back-fallback {
            font-family: sans-serif;
            font-size: 24px;
            color: #d2b88b;
            text-decoration: none;
            letter-spacing: -2px;
            margin-top: 5px;
        }

        .options-btn {
            width: 36px;
            object-fit: contain;
            cursor: pointer;
        
            margin-left: auto;}

        /* LOGO / ICON AREA */
        .icon-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 5px;
            margin-bottom: 10px;
        }

        /* Unified size for all central icons */
        .icon-container img {
            width: 100%;
            max-width: 250px;
            height: 190px;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0px 5px 15px rgba(0,0,0,0.8));
        }

        

        .page-title {
            font-size: 22px;
            color: #d2b88b;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* FORM */
        .wapon-form {
            display: flex;
            flex-direction: column;
            gap: 12px; /* Reducido el gap para encajar los 6 inputs + botones */
            width: 100%;
        }

        .input-group {
            position: relative;
            width: 100%;
        }

        .form-input {
            width: 100%;
            background: linear-gradient(145deg, #0a0f15 0%, #05080c 100%);
            border: 1px solid rgba(150, 40, 40, 0.5);
            border-radius: 30px;
            padding: 12px 25px; /* Reducido padding vertical */
            color: #d2b88b;
            font-family: 'EB Garamond', serif;
            font-size: 15px; /* Un pelín más pequeño */
            outline: none;
            box-shadow: 
                inset 0 2px 8px rgba(0,0,0,0.5),
                0 4px 12px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            position: relative;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }

        .form-input::placeholder {
            color: #d2b88b;
        }
        .form-textarea::placeholder {
            color: #d2b88b;
        }
        .custom-select-input::placeholder {
            color: #d2b88b;
        }

        /* Añadir la flecha custom para los selects */
        select.form-input {
            cursor: pointer;
            background-image: url('./images/assets%203%205.png'); background-size: auto 120%;
            background-repeat: no-repeat;
            background-position-x: 95%;
            background-position-y: center;
        }

        

        .form-input:focus {
            border-color: #ff5252;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5), 0 5px 20px rgba(235, 61, 61, 0.3);
        }

        /* Botones de acción del formulario */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 5px;
        }

        .btn-gold {
            width: 100%;
            background-color: #080b10;
            border: 1px solid rgba(140, 120, 80, 0.4);
            border-radius: 30px;
            padding: 12px 25px;
            color: #d2b88b;
            font-family: 'EB Garamond', serif;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4), inset 0 2px 5px rgba(0,0,0,0.3);
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
        }

        .btn-gold:hover {
            background-color: #111822;
            color: #ffffff;
            border-color: rgba(200, 200, 200, 0.5);
        }

    
        /* ====== MODAL MENU ====== */
        .modal-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(4, 9, 14, 0.88);
            z-index: 100;
            align-items: center;
            justify-content: center;
            border-radius: 40px;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-box {
            background-color: #080b10;
            border: 2px solid rgba(210, 184, 139, 0.4);
            border-radius: 30px;
            padding: 18px 20px 22px;
            width: 65%;
            max-width: 240px;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            animation: modalIn 0.25s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.92); }
            to   { opacity: 1; transform: scale(1); }
        }

        .modal-close {
            position: absolute;
            top: -26px;
            right: -26px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            object-fit: contain;
            transition: opacity 0.2s;
        }

        .modal-close:hover { opacity: 0.7; }

        

        .modal-divider {
            width: 100%;
            height: 22px;
            object-fit: contain;
            margin: 2px 0;
            opacity: 0.9;
        }

        .modal-nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin: 10px 0;
        }

        .modal-link {
            font-family: 'EB Garamond', serif;
            color: #d2b88b;
            text-decoration: none;
            font-size: 18px;
            letter-spacing: 1px;
            padding: 7px 0;
            transition: color 0.25s, letter-spacing 0.25s;
            display: block;
        }

        .modal-link:hover { color: #ffffff; letter-spacing: 2px; }

        .modal-link.modal-link-logout { color: #eb3d3d; }
        .modal-link.modal-link-logout:hover { color: #ff6666; letter-spacing: 2px; }

        .modal-link.active { color: #eb3d3d; }

        .modal-link-logout {
            font-family: 'EB Garamond', serif;
            color: #eb3d3d;
            text-decoration: none;
            font-size: 18px;
            letter-spacing: 1px;
            padding: 8px 0;
            margin-top: 4px;
            opacity: 0.85;
            transition: opacity 0.2s;
        }

        .modal-link-logout:hover { opacity: 1; }

    
        /* ====== SELECTOR MODAL ====== */
        .selector-modal-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(4, 9, 14, 0.88);
            z-index: 100;
            align-items: center;
            justify-content: center;
            border-radius: 40px; /* Mantener la curva externa */
        }
        .selector-modal-overlay.open {
            display: flex;
        }
        .selector-modal-box {
            background-color: #080b10;
            border: 2px solid rgba(210, 184, 139, 0.4);
            border-radius: 0; /* ¡Cuadrado como se pidió! */
            padding: 18px 20px 22px;
            width: 75%;
            max-width: 280px;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            animation: modalIn 0.25s ease;
        }
        .selector-title {
            font-size: 20px;
            color: #d2b88b;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .selector-option { font-family: 'EB Garamond', serif; color: #d2b88b; text-decoration: none; font-size: 18px; letter-spacing: 1px; padding: 7px 0; transition: color 0.25s, letter-spacing 0.25s; display: block; cursor: pointer; }
        .selector-option:hover { color: #ffffff; letter-spacing: 2px; }
        .selector-divider { width: 100%; height: 22px; object-fit: contain; margin: 2px 0; opacity: 0.9; display: block; } 
        .selector-modal-box .modal-close { top: -35px; right: -35px; }

    </style>
</head>
<body>

    <div class="mobile-container">
        
        <!-- HEADER -->
        <div class="header">
            <!-- Flecha hacia atrás -->
            <a href="13-wapons.html" style="text-decoration: none; color: #d2b88b;">
                <img src="./images/assets%203%203.png" alt="Back" class="back-btn" onerror="this.outerHTML='<div class=\'back-fallback\'>&#x27F5;</div>'">
            </a>
            <!-- Ícono de opciones -->
            <img src="./images/assets 4 3.png" alt="Options" class="options-btn">
        </div>

        <!-- LOGO / ICON AREA -->
        <div class="icon-container">
            <!-- Usando el asset 1 8 que me indicaste -->
            <img src="./images/assets 1 8.png" alt="New Wapon Icon" class="wapon-icon" onerror="this.src='https://via.placeholder.com/150?text=Sword'">
            <h2 class="page-title">New Wapon</h2>
        </div>

        <!-- FORM -->
        <form class="wapon-form">
            <div class="input-group">
                <input type="text" class="form-input" placeholder="Name">
            </div>
            
            
            <div class="input-group">
                <input type="text" id="customSelect_1" class="form-input custom-select-input" placeholder="Type" readonly 
                       onclick="openSelectorModal('Type', ['Dagger','Sword','Greatsword'], 'customSelect_1')"
                       style="cursor: pointer; background-image: url('./images/assets%203%205.png'); background-size: auto 120%; background-repeat: no-repeat; background-position-x: 95%; background-position-y: center;">
            </div>
            
            
            <div class="input-group">
                <input type="text" id="customSelect_2" class="form-input custom-select-input" placeholder="Rarity" readonly 
                       onclick="openSelectorModal('Rarity', ['Common','Rare','Legendary'], 'customSelect_2')"
                       style="cursor: pointer; background-image: url('./images/assets%203%205.png'); background-size: auto 120%; background-repeat: no-repeat; background-position-x: 95%; background-position-y: center;">
            </div>

            <div class="input-group">
                <input type="number" class="form-input" placeholder="Damage" step="0.01">
            </div>
            
            <div class="input-group">
                <!-- Aquí ya corregiste Localitation a Location -->
                <input type="text" class="form-input" placeholder="Location">
            </div>

            <div class="input-group">
                <input type="text" class="form-input" placeholder="Description">
            </div>
            
            <div class="action-buttons">
                <button type="button" class="btn-gold" onclick="window.location.href='13-wapons.html'">Create</button>
                <button type="button" class="btn-gold" onclick="window.location.href='13-wapons.html'">Cancel</button>
            </div>
        </form>

        
        <!-- ====== SELECTOR MODAL ====== -->
        <div class="selector-modal-overlay" id="selectorModal">
            <div class="selector-modal-box">
                <img src="./images/assets%205%203.png" alt="Close" class="modal-close" onclick="closeSelectorModal()">
                <div class="selector-title" id="selectorTitle">Select</div>
                <img src="./images/assets%202%2015.png" alt="Divider" class="selector-divider">
                <div id="selectorOptionsContainer">
                    <!-- Options go here dynamically -->
                </div>
            </div>
        </div>

        <!-- ====== MODAL MENU ====== -->
        <div class="modal-overlay" id="mainModal">
            <div class="modal-box">
                <!-- Botón cerrar -->
                <img src="./images/assets%205%203.png" alt="Close" class="modal-close" id="modalClose" onclick="closeModal()">

                <img src="./images/assets%202%203.png" alt="Divider" class="modal-divider" style="margin-bottom:8px;">

                <nav class="modal-nav">
                    <a href="04-dashboard.html" class="modal-link">Dashboard</a>
                    <img src="./images/assets%202%203.png" alt="Divider" class="modal-divider">
                    <a href="05-myprofile.html" class="modal-link">My Profile</a>
                    <img src="./images/assets%202%203.png" alt="Divider" class="modal-divider">
                    <a href="06-characters.html" class="modal-link">Characters</a>
                    <img src="./images/assets%202%203.png" alt="Divider" class="modal-divider">
                    <a href="13-wapons.html" class="modal-link">Weapons</a>
                    <img src="./images/assets%202%203.png" alt="Divider" class="modal-divider">
                    <a href="02-login.html" class="modal-link modal-link-logout">Log Out</a>
                </nav>

                <img src="./images/assets%202%203.png" alt="Divider" class="modal-divider" style="margin-top:8px;">
            </div>
    </div>

    </div><!-- end mobile-container -->


    <script>
        function fitScreen() {
            const container = document.querySelector('.mobile-container');
            // Calcula el factor de escala: si la pantalla es menor a 950px, lo encoge proporcionalmente.
            const scale = Math.min(1, window.innerHeight / 950);
            container.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';
        }
        window.addEventListener('resize', fitScreen);
        fitScreen();
    
        function openModal() {
            document.getElementById('mainModal').classList.add('open');
        }
        function closeModal() {
            document.getElementById('mainModal').classList.remove('open');
        }
        // Click en el overlay cierra el modal
        document.getElementById('mainModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        // Conectar el botón de opciones al modal
        document.querySelectorAll('.options-btn').forEach(function(btn) {
            btn.style.cursor = 'pointer';
            btn.addEventListener('click', openModal);
        });

    
        // --- Selector Modal Logic ---
        function openSelectorModal(title, optionsList, targetInputId) {
            document.getElementById('selectorTitle').innerText = title;
            const container = document.getElementById('selectorOptionsContainer');
            container.innerHTML = ''; // Clear old options

            optionsList.forEach((opt, index) => {
                const optEl = document.createElement('div');
                optEl.className = 'selector-option';
                optEl.innerText = opt;
                optEl.onclick = function() {
                    document.getElementById(targetInputId).value = opt;
                    document.getElementById(targetInputId).style.color = '#d2b88b'; // Set to active color
                    closeSelectorModal();
                };
                container.appendChild(optEl);

                // Add divider after each option
                const divEl = document.createElement('img');
                divEl.src = './images/assets 2 15.png';
                divEl.className = 'selector-divider';
                container.appendChild(divEl);
            });

            document.getElementById('selectorModal').classList.add('open');
        }

        function closeSelectorModal() {
            document.getElementById('selectorModal').classList.remove('open');
        }

        // Close when clicking outside the box
        document.getElementById('selectorModal').addEventListener('click', function(e) {
            if (e.target === this) closeSelectorModal();
        });

    </script>
</body>
</html>
