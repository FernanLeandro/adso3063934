<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13 - Wapons</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0b111a;
            font-family: 'EB Garamond', serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            color: #d2b88b;
            position: relative;
        }

        .mobile-container {
            width: 100%;
            max-width: 420px;
            height: 900px;
            
            display: flex;
            flex-direction: column;
            overflow: hidden;
            
            
            
            
        
            background-color: #080b10;
            background-image: linear-gradient(rgba(4, 9, 14, 0.5), rgba(4, 9, 14, 0.5)), url('./images/image%2013.png');
            background-size: cover;
            background-position: center;
            border-radius: 40px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            border: 2px solid rgba(210, 184, 139, 0.15);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transform-origin: center center;
            padding: 20px 30px 30px;}

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative;
            z-index: 10;
            width: 100%;
        }

        .options-btn {
            width: 36px;
            object-fit: contain;
            cursor: pointer;
        
            margin-left: auto;}

        /* LOGO / ICON AREA */
        .icon-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 5px;
            margin-bottom: 10px;
        }

        /* Unified size for all central icons */
        .icon-container img {
            width: 100%;
            max-width: 250px;
            height: 190px;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0px 5px 15px rgba(0,0,0,0.8));
        }

        

        .page-title {
            font-size: 22px;
            color: #d2b88b;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* NEW BUTTON */
        .btn-new {
            width: 100%;
            background-color: #080b10;
            border: 1px solid rgba(140, 120, 80, 0.4);
            border-radius: 30px;
            padding: 10px 25px;
            color: #d2b88b;
            font-family: 'EB Garamond', serif;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4), inset 0 2px 5px rgba(0,0,0,0.3);
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            margin-bottom: 15px;
        }

        .btn-new:hover {
            background-color: #111822;
            color: #ffffff;
            border-color: rgba(200, 200, 200, 0.5);
        }

        /* LIST CONTAINER */
        .list-container {
            flex-grow: 1;
            background-color: #080b10;
            border: 1px solid rgba(150, 40, 40, 0.5);
            border-radius: 40px;
            padding: 15px 15px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        /* LIST ITEMS */
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(210, 184, 139, 0.4);
        }

        .list-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .item-avatar {
            width: 48px;
            height: 48px;
            /* Aquí hacemos un círculo para armas */
            border-radius: 50%; 
            border: 1px solid rgba(140, 120, 80, 0.4);
            object-fit: contain; /* contain para que se vean completas las armas si pones imágenes */
            flex-shrink: 0;
            box-shadow: 0 3px 8px rgba(0,0,0,0.5);
            background-color: transparent;
        }

        .item-info {
            flex-grow: 1;
            padding: 0 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .item-title {
            color: #eb3d3d;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 2px;
        }

        .item-subtitle {
            color: #d2b88b;
            font-size: 12px;
            opacity: 0.8;
        }

        /* ITEM ACTIONS */
        .item-actions {
            display: flex;
            gap: 5px;
            flex-shrink: 0;
        }

        .action-circle {
            padding: 0;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid rgba(140, 120, 80, 0.8);
            color: rgba(140, 120, 80, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-circle svg {
            width: 20px;
            height: 20px;
            pointer-events: none;
            display: block;
        }

        .action-circle.delete {
            border-color: rgba(150, 40, 40, 0.7);
            color: rgba(150, 40, 40, 0.8);
        }

        .action-circle.delete svg {
            width: 20px;
            height: 20px;
        }

        .action-circle:hover {
            background: rgba(140, 120, 80, 0.15);
        }
        .action-circle.delete:hover {
            background: rgba(150, 40, 40, 0.15);
        }

        /* BOTTOM ACTIONS */
        .bottom-actions {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            position: relative;
            width: 100%;
            
        
            padding: 0 5px;}

        
        
        

        .action-link {
            position: relative;
            
            color: #d2b88b;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .action-link::before,
        .action-link::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 105px; /* Ancho de la línea decorativa */
            height:  10px;
            background-image: url('./images/assets%202%2018.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
        }

        .action-link::before {
            top: -14px;
        }

        .action-link::after {
            bottom: -14px;
        }

        

        

        

        .action-link.active {
            color: #eb3d3d;
        }

        .action-link:hover {
            color: #ffffff;
        }

    
        /* ====== MODAL MENU ====== */
        .modal-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(4, 9, 14, 0.88);
            z-index: 100;
            align-items: center;
            justify-content: center;
            border-radius: 40px;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-box {
            background-color: #080b10;
            border: 2px solid rgba(210, 184, 139, 0.4);
            border-radius: 30px;
            padding: 18px 20px 22px;
            width: 65%;
            max-width: 240px;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            animation: modalIn 0.25s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.92); }
            to   { opacity: 1; transform: scale(1); }
        }

        .modal-close {
            position: absolute;
            top: -26px;
            right: -26px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            object-fit: contain;
            transition: opacity 0.2s;
        }

        .modal-close:hover { opacity: 0.7; }

        

        .modal-divider {
            width: 100%;
            height: 22px;
            object-fit: contain;
            margin: 2px 0;
            opacity: 0.9;
        }

        .modal-nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin: 10px 0;
        }

        .modal-link {
            font-family: 'EB Garamond', serif;
            color: #d2b88b;
            text-decoration: none;
            font-size: 18px;
            letter-spacing: 1px;
            padding: 7px 0;
            transition: color 0.25s, letter-spacing 0.25s;
            display: block;
        }

        .modal-link:hover { color: #ffffff; letter-spacing: 2px; }

        .modal-link.modal-link-logout { color: #eb3d3d; }
        .modal-link.modal-link-logout:hover { color: #ff6666; letter-spacing: 2px; }

        .modal-link.active { color: #eb3d3d; }

        .modal-link-logout {
            font-family: 'EB Garamond', serif;
            color: #eb3d3d;
            text-decoration: none;
            font-size: 18px;
            letter-spacing: 1px;
            padding: 8px 0;
            margin-top: 4px;
            opacity: 0.85;
            transition: opacity 0.2s;
        }

        .modal-link-logout:hover { opacity: 1; }

    
        .form-input::placeholder {
            color: #d2b88b;
        }
        .form-textarea::placeholder {
            color: #d2b88b;
        }
        .custom-select-input::placeholder {
            color: #d2b88b;
        }
    </style>
</head>

    <script>
        function fitScreen() {
            const container = document.querySelector('.mobile-container');
            // Calcula el factor de escala: si la pantalla es menor a 950px, lo encoge proporcionalmente.
            const scale = Math.min(1, window.innerHeight / 950);
            container.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';
        }
        window.addEventListener('resize', fitScreen);
        fitScreen();
    
        function openModal() {
            document.getElementById('mainModal').classList.add('open');
        }
        function closeModal() {
            document.getElementById('mainModal').classList.remove('open');
        }
        // Click en el overlay cierra el modal
        document.getElementById('mainModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        // Conectar el botón de opciones al modal
        document.querySelectorAll('.options-btn').forEach(function(btn) {
            btn.style.cursor = 'pointer';
            btn.addEventListener('click', openModal);
        });
    <!-- end mobile-container -->

    </script>
