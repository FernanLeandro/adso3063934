<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lies of P Wireframes</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'EB Garamond', serif;
            color: #f3f0e9;
            background: #204C73;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top, rgba(135, 206, 250, 0.15), transparent 30%),
                        radial-gradient(circle at bottom right, rgba(16, 38, 58, 0.35), transparent 18%);
            pointer-events: none;
            z-index: 0;
        }
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 32px;
            background: rgba(32, 76, 115, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }
        .logo {
            font-size: 1.2rem;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: #f7e5c7;
            font-weight: 700;
        }
        .nav-links {
            display: flex;
            gap: 28px;
        }
        .nav-links a {
            color: rgba(243, 240, 233, 0.75);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.82rem;
            letter-spacing: 0.2em;
            transition: color 0.2s ease, border-color 0.2s ease;
        }
        .nav-links a:hover {
            color: #f7e5c7;
        }
        .nav-links a.active {
            color: #f7e5c7;
            border-bottom: 2px solid #f7e5c7;
            padding-bottom: 2px;
        }
        .top-bar {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 16px;
        }
        .top-bar select {
            background: rgba(11, 11, 11, 0.8);
            color: #f3f0e9;
            border: 1px solid rgba(243, 230, 199, 0.35);
            border-radius: 8px;
            padding: 12px 18px;
            min-width: 200px;
            font-size: 0.95rem;
            outline: none;
            appearance: none;
        }
        .hero {
            position: relative;
            z-index: 1;
            max-width: 980px;
            margin: 40px auto 20px;
            padding: 80px 24px;
            text-align: center;
            background-image: url('https://cdn.cloudflare.steamstatic.com/steam/apps/1627720/capsule_616x353.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(32, 76, 115, 0.4) 0%, rgba(0, 0, 0, 0.8) 100%);
            z-index: -1;
        }
        .hero h1 {
            margin: 0;
            font-size: clamp(2.5rem, 4vw, 4rem);
            line-height: 0.95;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #f8f3e8;
            text-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        }
        .hero p {
            max-width: 740px;
            margin: 20px auto 0;
            color: rgba(243, 240, 233, 0.78);
            font-size: 1rem;
            line-height: 1.9;
        }
        .hero small {
            display: inline-block;
            margin-top: 18px;
            color: rgba(243, 240, 233, 0.55);
            text-transform: uppercase;
            letter-spacing: 0.25em;
            font-size: 0.78rem;
        }
        .content {
            position: relative;
            z-index: 1;
            max-width: 1120px;
            margin: 0 auto 80px;
            padding: 0 24px;
        }
        .section {
            display: none;
            margin-top: 40px;
        }
        .section.active {
            display: block;
            animation: fadeInSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeInSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .section-title {
            margin-bottom: 22px;
            color: #f7e5c7;
            text-transform: uppercase;
            letter-spacing: 0.22em;
            font-size: 0.86rem;
            text-align: center;
        }
        .iframe-card {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto 24px;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 28px 90px rgba(0,0,0,0.55);
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(11, 11, 11, 0.3);
            position: relative;
        }
        .iframe-card iframe {
            width: 100%;
            height: 900px;
            border: 0;
            display: block;
        }
        .fullscreen-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(32, 76, 115, 0.95);
            border: 1px solid rgba(247, 229, 199, 0.4);
            border-radius: 8px;
            padding: 10px 20px;
            color: #f7e5c7;
            font-family: 'EB Garamond', serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 20;
            letter-spacing: 0.1em;
        }
        .fullscreen-btn:hover {
            background: rgba(247, 229, 199, 0.25);
            border-color: #f7e5c7;
            transform: translateY(-1px);
        }
        .iframe-card:fullscreen {
            width: 100vw;
            height: 100vh;
            max-width: none;
            margin: 0;
            border-radius: 0;
        }
        .iframe-card:fullscreen iframe {
            height: 100vh;
        }
        .iframe-card:-webkit-full-screen {
            width: 100vw;
            height: 100vh;
            max-width: none;
            margin: 0;
            border-radius: 0;
        }
        .iframe-card:-webkit-full-screen iframe {
            height: 100vh;
        }
        .iframe-card:-ms-fullscreen {
            width: 100vw;
            height: 100vh;
            max-width: none;
            margin: 0;
            border-radius: 0;
        }
        .iframe-card:-ms-fullscreen iframe {
            height: 100vh;
        }
        .hint {
            margin-top: 48px;
            color: rgba(243, 240, 233, 0.6);
            text-align: center;
            font-size: 0.95rem;
        }
        @media (max-width: 860px) {
            header {
                flex-wrap: wrap;
                justify-content: center;
                gap: 14px;
                padding: 14px 20px;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 14px;
            }
            .hero {
                padding: 60px 20px;
                margin-top: 20px;
            }
            .iframe-card iframe {
                height: 450px;
            }
        }
    </style>
</head>
<body>
<header>
    <div class="logo">LIES OF P</div>
    <nav class="nav-links">
        <a href="#" class="nav-btn active" data-section="wireframe">Wireframe</a>
        <a href="#" class="nav-btn" data-section="styleguide">Style Guide</a>
        <a href="#" class="nav-btn" data-section="prototype">Prototype 1</a>
        <a href="#" class="nav-btn" data-section="mockup">Mockup</a>
        <a href="#" class="nav-btn" data-section="prototype2">Prototype 2</a>
        <a href="#" class="nav-btn" data-section="layout">Layout</a>
    </nav>
</header>
<section class="hero">
    <p>Interface Design, Style Guide and Interactive Prototypes for the Mobile version of Lies of P in React Native.</p>
    <small>ADSO 3063934 • Fernan Leandro</small>
</section>
<div class="content">

    <div id="wireframe" class="section active">
        <div class="section-title">Wireframe</div>
        <div class="iframe-card">
            <iframe style="border: 1px solid rgba(0, 0, 0, 0.1);" width="800" height="450" src="https://embed.figma.com/design/QxaJYJz6Y0WSu9ExQZ3bAq/Lies-of-p?node-id=0-1&embed-host=share" allowfullscreen></iframe>
        </div>
    </div>

    <div id="styleguide" class="section">
        <div class="section-title">Style Guide</div>
        <div class="iframe-card">
            <iframe style="border: 1px solid rgba(0, 0, 0, 0.1);" width="800" height="450" src="https://embed.figma.com/design/QxaJYJz6Y0WSu9ExQZ3bAq/Lies-of-p?node-id=1267-3&embed-host=share" allowfullscreen></iframe>
        </div>
    </div>

    <div id="prototype" class="section">
        <div class="section-title">Prototype 1</div>
        <div class="iframe-card">
            <iframe style="border: 1px solid rgba(0, 0, 0, 0.1);" width="800" height="450" src="https://embed.figma.com/proto/QxaJYJz6Y0WSu9ExQZ3bAq/Lies-of-p?node-id=4-2&p=f&viewport=318%2C158%2C0.18&scaling=scale-down&content-scaling=fixed&starting-point-node-id=4%3A2&page-id=0%3A1&embed-host=share" allowfullscreen></iframe>
        </div>
    </div>

    <div id="mockup" class="section">
        <div class="section-title">Mockup</div>
        <div class="iframe-card">
            <iframe style="border: 1px solid rgba(0, 0, 0, 0.1);" width="800" height="450" src="https://embed.figma.com/design/QxaJYJz6Y0WSu9ExQZ3bAq/Lies-of-p?node-id=1267-30&embed-host=share" allowfullscreen></iframe>
        </div>
    </div>

    <div id="prototype2" class="section">
        <div class="section-title">Prototype 2</div>
        <div class="iframe-card">
            <iframe style="border: 1px solid rgba(0, 0, 0, 0.1);" width="800" height="450" src="https://embed.figma.com/proto/QxaJYJz6Y0WSu9ExQZ3bAq/Lies-of-p?node-id=1288-1129&p=f&viewport=794%2C400%2C0.11&scaling=scale-down&content-scaling=fixed&page-id=1267%3A30&embed-host=share" allowfullscreen></iframe>
        </div>
    </div>

    <div id="layout" class="section">
        <div class="section-title">Layout Implementation</div>
        <div class="iframe-card" id="layoutIframeCard">
            <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ fullscreen</button>
            <!-- Using the local 01-welcome.html file as the entry point -->
            <iframe style="border: 1px solid rgba(0, 0, 0, 0.1);" width="800" height="450" src="06-layout/01-welcome.html" allowfullscreen></iframe>
        </div>
    </div>

</div>
<script>
    const navBtns = document.querySelectorAll('.nav-btn');
    
    function loadIframeForSection(sectionId) {
        const section = document.getElementById(sectionId);
        if (section) {
            const iframe = section.querySelector('iframe');
            if (iframe && iframe.dataset.src) {
                if (!iframe.getAttribute('src')) {
                    iframe.setAttribute('src', iframe.dataset.src);
                }
            }
        }
    }

    navBtns.forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            const sectionId = this.getAttribute('data-section');
            
            // Remover active de todos los botones y secciones
            navBtns.forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            
            // Agregar active al botón y sección clickeados
            this.classList.add('active');
            if (sectionId) {
                const targetSection = document.getElementById(sectionId);
                if (targetSection) {
                    targetSection.classList.add('active');
                    loadIframeForSection(sectionId);
                }
            }
        });
    });

    // Cargar el iframe de la sección activa inmediatamente
    const activeBtn = document.querySelector('.nav-btn.active');
    if (activeBtn) {
        const sectionId = activeBtn.getAttribute('data-section');
        if (sectionId) {
            loadIframeForSection(sectionId);
        }
    }

    // Fullscreen toggle function - uses real browser fullscreen API
    function toggleFullscreen() {
        const iframeCard = document.getElementById('layoutIframeCard');
        const btn = document.querySelector('.fullscreen-btn');
        
        if (!document.fullscreenElement) {
            // Enter fullscreen
            if (iframeCard.requestFullscreen) {
                iframeCard.requestFullscreen();
            } else if (iframeCard.webkitRequestFullscreen) {
                iframeCard.webkitRequestFullscreen();
            } else if (iframeCard.msRequestFullscreen) {
                iframeCard.msRequestFullscreen();
            }
            btn.textContent = '✕ exit';
        } else {
            // Exit fullscreen
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            } else if (document.msExitFullscreen) {
                document.msExitFullscreen();
            }
            btn.textContent = '⛶ fullscreen';
        }
    }

    // Listen for fullscreen changes to update button text
    document.addEventListener('fullscreenchange', function() {
        const btn = document.querySelector('.fullscreen-btn');
        if (document.fullscreenElement) {
            btn.textContent = '✕ exit';
        } else {
            btn.textContent = '⛶ fullscreen';
        }
    });
    document.addEventListener('webkitfullscreenchange', function() {
        const btn = document.querySelector('.fullscreen-btn');
        if (document.webkitFullscreenElement) {
            btn.textContent = '✕ exit';
        } else {
            btn.textContent = '⛶ fullscreen';
        }
    });
</script>
</body>
</html>
