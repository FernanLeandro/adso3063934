<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lies of P Wireframes</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'EB Garamond', serif;
            color: #f3f0e9;
            background: #D93D4A;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top, rgba(255, 150, 150, 0.18), transparent 30%),
                        radial-gradient(circle at bottom right, rgba(217, 61, 74, 0.25), transparent 18%);
            pointer-events: none;
            z-index: 0;
        }
        header {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo {
            font-size: 1.2rem;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: #f7e5c7;
            font-weight: 700;
        }
        .nav-links {
            display: flex;
            gap: 28px;
        }
        .nav-links a {
            color: rgba(243, 240, 233, 0.75);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.82rem;
            letter-spacing: 0.2em;
            transition: color 0.2s ease;
        }
        .nav-links a:hover {
            color: #f7e5c7;
        }
        .nav-links a.active {
            color: #f7e5c7;
            border-bottom: 2px solid #f7e5c7;
            padding-bottom: 2px;
        }
        .top-bar {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 16px;
        }
        .top-bar select {
            background: rgba(11, 11, 11, 0.8);
            color: #f3f0e9;
            border: 1px solid rgba(243, 230, 199, 0.35);
            border-radius: 8px;
            padding: 12px 18px;
            min-width: 200px;
            font-size: 0.95rem;
            outline: none;
            appearance: none;
        }
        .hero {
            position: relative;
            z-index: 1;
            max-width: 980px;
            margin: 0 auto;
            padding: 160px 24px 80px;
            text-align: center;
            background-image: url('https://cdn.cloudflare.steamstatic.com/steam/apps/1627720/capsule_616x353.jpg');
            background-size: cover;
            background-position: right center;
            background-repeat: no-repeat;
            border-radius: 24px;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: -1;
        }
        .hero h1 {
            margin: 0;
            font-size: clamp(3rem, 5vw, 5rem);
            line-height: 0.95;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #f8f3e8;
            text-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
        }
        .hero p {
            max-width: 740px;
            margin: 24px auto 0;
            color: rgba(243, 240, 233, 0.78);
            font-size: 1rem;
            line-height: 1.9;
        }
        .hero small {
            display: inline-block;
            margin-top: 18px;
            color: rgba(243, 240, 233, 0.55);
            text-transform: uppercase;
            letter-spacing: 0.25em;
            font-size: 0.78rem;
        }
        .content {
            position: relative;
            z-index: 1;
            max-width: 1120px;
            margin: 0 auto 80px;
            padding: 0 24px;
        }
        .section {
            display: none;
            margin-top: 40px;
        }
        .section.active {
            display: block;
        }
        .section-title {
            margin-bottom: 22px;
            color: #f7e5c7;
            text-transform: uppercase;
            letter-spacing: 0.22em;
            font-size: 0.86rem;
        }
        .iframe-card {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto 24px;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 28px 90px rgba(0,0,0,0.55);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .iframe-card iframe {
            width: 100%;
            height: 520px;
            border: 0;
        }
        .hint {
            margin-top: 48px;
            color: rgba(243, 240, 233, 0.6);
            text-align: center;
            font-size: 0.95rem;
        }
        @media (max-width: 860px) {
            header {
                flex-wrap: wrap;
                justify-content: center;
                gap: 14px;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }
            .hero {
                padding-top: 100px;
            }
            .iframe-card iframe {
                height: 420px;
            }
        }
    </style>
</head>
<body>
<header>
    <div class="logo">LIES OF P</div>
    <nav class="nav-links">
        <a href="#" class="nav-btn active" data-section="wireframe">Wireframe</a>
        <a href="#" class="nav-btn" data-section="styleguide">Style Guide</a>
        <a href="#" class="nav-btn" data-section="prototype">Prototype 1</a>
        <a href="#" class="nav-btn" data-section="mockup">Mockup</a>
        <a href="#" class="nav-btn" data-section="prototype2">Prototype 2</a>
        <a href="#" class="nav-btn" data-section="layout">Layout</a>
    </nav>
</header>
<section class="hero">
    <h1>Wireframes y Guía de Estilo</h1>
</section>
<div class="content">

    <div id="styleguide" class="section">
        <div class="section-title">Style Guide</div>
        <div class="iframe-card">
            <iframe style="border: 1px solid rgba(0, 0, 0, 0.1);" width="800" height="450" src="https://embed.figma.com/design/QxaJYJz6Y0WSu9ExQZ3bAq/Lies-of-p?node-id=1267-11&embed-host=share" allowfullscreen></iframe>
        </div>
    </div>
    <div id="wireframe" class="section active">
        <div class="section-title">Wireframe</div>
        <div class="iframe-card">
            <iframe src="https://embed.figma.com/design/QxaJYJz6Y0WSu9ExQZ3bAq/Lies-of-p-wireframe-hifi?node-id=0-1&embed-host=share" allowfullscreen></iframe>
        </div>
    </div>
    <div id="prototype" class="section">
        <div class="section-title">Prototype 1</div>
        <div class="iframe-card">
            <iframe style="border: 1px solid rgba(0, 0, 0, 0.1);" width="800" height="450" src="https://embed.figma.com/proto/QxaJYJz6Y0WSu9ExQZ3bAq/Lies-of-p-wireframe-hifi?node-id=4-2&p=f&viewport=455%2C187%2C0.06&scaling=scale-down&content-scaling=fixed&starting-point-node-id=4%3A2&page-id=0%3A1&embed-host=share" allowfullscreen></iframe>
        </div>
    </div>
    <div id="mockup" class="section">
        <div class="section-title">Mockup</div>
        <div class="iframe-card">
            <!-- Mockup content aquí -->
        </div>
    </div>
    <div id="prototype2" class="section">
        <div class="section-title">Prototype 2</div>
        <div class="iframe-card">
            <!-- Prototype 2 content aquí -->
        </div>
    </div>
    <div id="layout" class="section">
        <div class="section-title">Layout</div>
        <div class="iframe-card">
            <!-- Layout content aquí -->
        </div>
    </div>
</div>
<script>
    const navBtns = document.querySelectorAll('.nav-btn');
    navBtns.forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            const sectionId = this.getAttribute('data-section');
            
            // Remover active de todos los botones y secciones
            navBtns.forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            
            // Agregar active al botón y sección clickeados
            this.classList.add('active');
            if (sectionId) {
                document.getElementById(sectionId).classList.add('active');
            }
        });
    });
</script>
</body>
</html>
